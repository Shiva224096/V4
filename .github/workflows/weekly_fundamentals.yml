name: Weekly Fundamentals Scan

on:
  schedule:
    - cron: '30 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas pytz

      - name: Run fundamental engine
        run: python scripts/fundamental_engine.py --max 500

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/fundamentals.json
          git diff --cached --quiet || git commit -m "Update fundamentals data $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push

      - name: Send completion email
        if: always()
        run: |
          pip install secure-smtplib 2>/dev/null || true
          python scripts/send_fund_email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
