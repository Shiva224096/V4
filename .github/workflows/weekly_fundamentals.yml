name: Weekly Fundamentals Scan

on:
  schedule:
    # Every Sunday at 4:30 AM UTC = 10:00 AM IST
    - cron: '30 4 * * 0'
  workflow_dispatch:  # Manual trigger button

permissions:
  contents: write

jobs:
  scan-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz

      - name: Run fundamental engine
        run: |
          python scripts/fundamental_engine.py --max 500

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/fundamentals.json
          git diff --cached --quiet || git commit -m "Update fundamentals data $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Send completion email
        if: always()
        run: |
          python -c "
import smtplib, os, json
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart

user = os.environ.get('GMAIL_USER','')
pw = os.environ.get('GMAIL_PASS','')
to = os.environ.get('RECIPIENT_EMAIL','')
if not all([user, pw, to]):
    print('Email credentials not set, skipping...')
    exit(0)

# Load results
try:
    data = json.load(open('data/fundamentals.json'))
    total = data.get('total', 0)
    stocks = data.get('stocks', [])
    strong = [s for s in stocks if s.get('badge') == 'Strong Buy']
    buy = [s for s in stocks if s.get('badge') == 'Buy']
except:
    total, strong, buy = 0, [], []

html = '<h2>Fundamental Scan Complete</h2>'
html += f'<p><b>{total}</b> stocks screened | <b>{len(strong)}</b> Strong Buy | <b>{len(buy)}</b> Buy</p>'
if strong:
    html += '<h3>Top Strong Buy Picks:</h3><table border=1 cellpadding=5><tr><th>Symbol</th><th>Name</th><th>Score</th><th>PE</th><th>ROE%</th><th>F-Score</th></tr>'
    for s in strong[:15]:
        html += f'<tr><td><b>{s[\"symbol\"]}</b></td><td>{s.get(\"name\",\"\")}</td><td>{s[\"composite_score\"]}</td><td>{s.get(\"pe\",\"—\")}</td><td>{s.get(\"roe\",\"—\")}</td><td>{s.get(\"fscore\",\"—\")}/9</td></tr>'
    html += '</table>'
html += '<br><p><a href=\"https://shiva224096.github.io/V4/frontend/\">Open Dashboard</a></p>'

msg = MIMEMultipart('alternative')
msg['Subject'] = f'SwingEdge: Fundamental Scan Done - {len(strong)} Strong Buys'
msg['From'] = user
msg['To'] = to
msg.attach(MIMEText(html, 'html'))

with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
    s.login(user, pw)
    s.sendmail(user, to, msg.as_string())
print('Email sent!')
"
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
