name: Weekly Backtest — Sunday 9 PM IST

on:
  schedule:
    - cron: '30 15 * * 0'    # Sunday 9:00 PM IST (15:30 UTC)
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest engine
        run: python scripts/backtester.py

      - name: Commit backtest results
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add -f data/backtest_results.json || true
          git diff --staged --quiet || git commit -m "chore: backtest results $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
